###############################################################################
# Matterbridge + plugin Cozytouch — macOS (développement)
#
# Sur macOS, network_mode: host n'est pas supporté.
# Ce fichier utilise le mapping de ports classique.
#
# Start :  docker compose -f docker-compose.macos.yml up -d
# Logs  :  docker compose -f docker-compose.macos.yml logs -f
# Stop  :  docker compose -f docker-compose.macos.yml down
#
# ⚠️  En production (Linux / Gladys), utilisez docker-compose.yml
#     avec network_mode: host pour que mDNS fonctionne correctement.
###############################################################################

services:
  matterbridge:
    image: luligu/matterbridge:latest
    container_name: matterbridge-cozytouch
    restart: unless-stopped

    # Sur macOS, on mappe les ports nécessaires
    ports:
      - '8283:8283'       # Frontend web Matterbridge
      - '5540:5540'       # Matter commissioning (TCP+UDP)
      - '5540:5540/udp'

    volumes:
      # Données persistantes Matterbridge (config, state, certs)
      - matterbridge-config:/root/.matterbridge
      - matterbridge-certs:/root/.mattercert

      # Monte le plugin local (code source buildé) dans le container
      - ./dist:/root/Matterbridge/matterbridge-plugin-cozytouch/dist:ro
      - ./package.json:/root/Matterbridge/matterbridge-plugin-cozytouch/package.json:ro
      - ./matterbridge-plugin-cozytouch.config.json:/root/Matterbridge/matterbridge-plugin-cozytouch/matterbridge-plugin-cozytouch.config.json
      - ./matterbridge-plugin-cozytouch.schema.json:/root/Matterbridge/matterbridge-plugin-cozytouch/matterbridge-plugin-cozytouch.schema.json:ro

      # Le node_modules du container est dans un volume séparé
      - plugin-node-modules:/root/Matterbridge/matterbridge-plugin-cozytouch/node_modules

    environment:
      - TZ=Europe/Paris

    # Installe les deps du plugin et lie matterbridge avant de démarrer
    entrypoint: >
      sh -c '
        cd /root/Matterbridge/matterbridge-plugin-cozytouch &&
        npm install --omit=dev 2>/dev/null;
        ln -sf /usr/local/lib/node_modules/matterbridge node_modules/matterbridge 2>/dev/null;
        exec /matterbridge/entrypoint.latest.sh matterbridge -docker
      '

    # Health check intégré à l'image
    healthcheck:
      test: ['CMD', 'mb_health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  matterbridge-config:
  matterbridge-certs:
  plugin-node-modules:

